<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Aplikasi Tugas Saya</title>
    <!-- Menghubungkan ke file CSS nanti -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wadah">
        <h1>Daftar Tugas Ku</h1>
        
        <!-- Tempat mengetik tugas baru -->
        <div class="input-area">
            <input type="text" id="inputTugas" placeholder="Ketik tugas baru di sini...">
            <button id="tombolTambah">Tambah</button>
        </div>

        <!-- Tempat daftar tugas akan muncul -->
        <ul id="daftarTugas"></ul>
    </div>

    <!-- Menghubungkan ke file JavaScript nanti -->
    <script src="script.js"></script>
</body>
</html>
